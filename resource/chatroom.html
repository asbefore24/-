<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eef5 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器 - 白色玻璃态 + 柔和阴影 */
        .chat-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 头部区域 - 柔和浅色毛玻璃 */
        .chat-header {
            padding: 1.2rem 1.8rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #6366f1, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area h1::before {
            content: "💬";
            font-size: 1.7rem;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #3b82f6;
        }

        /* 主体布局 - 弹性撑满 */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 消息展示区 - 浅色风格 + 精致边框 */
        .messages-area {
            flex: 1;
            margin: 1.2rem 1.5rem 0.8rem 1.5rem;
            padding: 1rem 1.2rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.2rem;
            font-family: 'Inter', 'Segoe UI', system-ui, monospace;
            font-size: 0.9rem;
            line-height: 1.55;
            color: #1e293b;
            resize: none;
            outline: none;
            transition: all 0.2s;
            overflow-y: auto;
            scroll-behavior: smooth;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        /* 自定义滚动条 (消息区域) - 浅色主题 */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
            margin-block: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 聚焦效果 */
        .messages-area:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 输入栏区域 */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 0.8rem 1.5rem 1.5rem 1.5rem;
            background: transparent;
        }

        /* 输入框 - 浅色柔和风格 */
        .message-input {
            flex: 1;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .message-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: #ffffff;
        }

        .message-input::placeholder {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* 发送按钮 - 清新蓝色渐变 */
        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.2);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        /* 响应式微调 (手机端舒适) */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .chat-wrapper {
                height: 94vh;
                border-radius: 1.5rem;
            }
            .chat-header {
                padding: 0.9rem 1.2rem;
            }
            .logo-area h1 {
                font-size: 1.4rem;
            }
            .logo-area h1::before {
                font-size: 1.3rem;
            }
            .messages-area {
                margin: 1rem 1rem 0.6rem 1rem;
                padding: 0.8rem 1rem;
                font-size: 0.85rem;
            }
            .input-area {
                padding: 0.6rem 1rem 1.2rem 1rem;
                gap: 10px;
            }
            .message-input {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            .send-btn {
                width: 44px;
                height: 44px;
                font-size: 1.2rem;
            }
        }

        /* 让textarea可垂直调整大小，但更美观 */
        .messages-area {
            resize: vertical;
            min-height: 120px;
        }

        /* 优雅的占位符样式 */
        .messages-area::placeholder {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="chat-wrapper">
    <div class="chat-header">
        <div class="logo-area">
            <h1>聊天室</h1>
        </div>
    </div>
    
    <div class="main-layout">
        <div class="messages-container">
            <textarea class="messages-area" id="messagesArea" placeholder="✨ 聊天记录将在这里显示 ..."></textarea>
            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="输入消息，回车发送" autocomplete="off">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
