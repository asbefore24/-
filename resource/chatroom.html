<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eef5 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器 - 白色玻璃态 + 柔和阴影 */
        .chat-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 头部区域 - 柔和浅色毛玻璃 */
        .chat-header {
            padding: 1.2rem 1.8rem;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #6366f1, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area h1::before {
            content: "💬";
            font-size: 1.7rem;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #3b82f6;
        }

        /* 主体布局 - 弹性撑满 */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .username-display-wrapper {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 48px;
            padding: 0 4px 0 0;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
            transition: all 0.2s ease;
        }

        .username-display-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
        }

        /* 用户名显示 span - 美化文字 */
        #inputUsernameText {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 18px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 48px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
        }

        #inputUsernameText:empty {
            padding: 0 18px;
        }

        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 消息展示区 - 浅色风格 + 精致边框 */
        .messages-area {
            flex: 1;
            margin: 1.2rem 1.5rem 0.8rem 1.5rem;
            padding: 1rem 1.2rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.2rem;
            font-family: 'Inter', 'Segoe UI', system-ui, monospace;
            font-size: 0.9rem;
            line-height: 1.55;
            color: #1e293b;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
            overflow-y: auto;
            scroll-behavior: smooth;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 消息条目 - 气泡风格 */
        .message-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            animation: fadeInUp 0.2s ease-out;
        }

        /* 我自己的消息靠右样式 (根据用户名判断，动态添加类) */
        .message-item.self {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 10px 16px;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
            transition: all 0.1s;
            word-wrap: break-word;
        }

        .self .message-bubble {
            background: linear-gradient(135deg, #e0f2fe, #d9e6ff);
            border-bottom-right-radius: 6px;
            color: #0c4a6e;
        }

        .other .message-bubble {
            background: #f8fafc;
            border-bottom-left-radius: 6px;
            border: 1px solid #eef2ff;
        }

        .message-meta {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 4px;
            font-size: 0.7rem;
            color: #5b6e8c;
            flex-wrap: wrap;
        }

        .message-username {
            font-weight: 700;
            color: #3b82f6;
            font-size: 0.75rem;
        }

        .self .message-username {
            color: #6366f1;
        }

        .message-time {
            font-size: 0.65rem;
            color: #94a3b8;
            letter-spacing: 0.2px;
        }

        .message-content {
            font-size: 0.9rem;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* 空状态提示 */
        .empty-chat {
            text-align: center;
            color: #94a3b8;
            padding: 2rem;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* 自定义滚动条 (消息区域) - 浅色主题 */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
            margin-block: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 聚焦效果 */
        .messages-area:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 输入栏区域 */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 0.8rem 1.5rem 1.5rem 1.5rem;
            background: transparent;
        }

        /* 输入框 - 浅色柔和风格 */
        .message-input {
            flex: 1;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .message-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: #ffffff;
        }

        .message-input::placeholder {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* 发送按钮 - 清新蓝色渐变 */
        .send-btn {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.2);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .send-btn:active {
            transform: scale(0.92);
        }
    </style>
</head>

<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="logo-area">
                <h1>聊天室</h1>
            </div>
        </div>

        <div class="main-layout">
            <div class="messages-container">
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <div class="username-display-wrapper">
                        <span id="inputUsernameText"></span>
                    </div>
                    <input type="text" id="messageInput" class="message-input" placeholder="输入消息">
                    <button class="send-btn" id="sendBtn" onclick=sendMessage()>➤</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let currentUser = localStorage.getItem('chatUsername')

        document.getElementById('inputUsernameText').innerText = currentUser;

        const messageInput = document.getElementById('messageInput');
        const messagesArea = document.getElementById('messagesArea');

                function renderMessages(messagesArray) {
            if (!messagesArea) return;
            if (!Array.isArray(messagesArray) || messagesArray.length === 0) {
                messagesArea.innerHTML = '<div class="empty-chat">✨ 暂无消息，发送第一条吧~</div>';
                return;
            }

            messagesArea.innerHTML = '';

            messagesArray.forEach(msg => {
                // 安全取值: message, time, username
                const messageText = msg.message;
                const timeStr = msg.time;
                const username = msg.username;

                // 判断是否是当前用户发送的消息 (用于气泡靠右)
                const isSelf = (username === currentUser);

                // 创建外层 message-item
                const itemDiv = document.createElement('div');
                itemDiv.className = 'message-item';
                if (isSelf) {
                    itemDiv.classList.add('self');
                } else {
                    itemDiv.classList.add('other');
                }

                // 气泡内部结构: 元信息 + 内容
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'message-bubble';

                // 元信息区 (用户名 + 时间)
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                const usernameSpan = document.createElement('span');
                usernameSpan.className = 'message-username';
                usernameSpan.innerText = username;
                const timeSpan = document.createElement('span');
                timeSpan.className = 'message-time';
                timeSpan.innerText = timeStr;
                metaDiv.appendChild(usernameSpan);
                metaDiv.appendChild(timeSpan);

                // 消息内容区
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                // 简单支持换行符转义，保留文本样式
                contentDiv.innerText = messageText;

                bubbleDiv.appendChild(metaDiv);
                bubbleDiv.appendChild(contentDiv);
                itemDiv.appendChild(bubbleDiv);
                messagesArea.appendChild(itemDiv);
            });

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function getTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        async function postRequest(endpoint, data) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const contentType = response.headers.get('content-type');
                if (contentType?.includes('application/json')) {
                    return await response.json();
                } else {
                    return await response.text();
                }
            } catch (error) {
                console.error(`POST 失败: ${endpoint}`, error);
                throw error;
            }
        }

        async function sendMessage() {
            try {
                let message = messageInput.value;
                if (!message || message.trim() === '') {
                    return;
                }

                const result = await postRequest('/sendMessage', {
                    time: getTimeString(),
                    username: currentUser,
                    message: message.trim()
                });
                messageInput.value = '';
                await recvMessage();
            } catch (error) {
                console.error(`发送失败:`, error);
            }
        }


        let localmessages = [];
        // 接收消息 (从后端拉取)
        async function recvMessage() {
            try {
                const result = await postRequest('/recvMessage', {});
                let messageArray = [];
                if (Array.isArray(result)) {
                    messageArray = result;
                } else if (typeof result === 'string') {
                    try {
                        const parsed = JSON.parse(result);
                        if (Array.isArray(parsed))  {
                            messageArray = parsed;
                        }
                    } catch(e) {
                        console.warn('解析字符串失败', result);
                    }
                }
                
                // 确保每条数据拥有标准字段 (兼容后端可能缺少字段)
                const safeMessages = messageArray.map(item => ({
                    message: item.message,
                    time: item.time,
                    username: item.username
                }));
                
                // 调用渲染函数，将消息数组显示到界面上
                if (safeMessages.length > localmessages.length) {
                    localmessages = safeMessages;
                    renderMessages(safeMessages);
                }
            } catch (error) {
                console.error(`接收信息失败:`, error);
            }
        }

        let intervalId = setInterval(() => {
            recvMessage();
        }, 1000);
    </script>
</body>

</html>
